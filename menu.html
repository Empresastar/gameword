<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Roblox P2P - Menu</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { 
            background: #333; border: 2px solid #444; border-radius: 10px; 
            width: 200px; padding: 15px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: #26ba40; transform: scale(1.05); }
        .thumb { width: 100%; height: 120px; background: #555; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h1>Selecione um Mapa</h1>
    <p>Logado como: <span id="user-display" style="color: #26ba40;">...</span></p>

    <div class="grid">
        <div class="card" onclick="entrarNoJogo('Parkour Obby', 'jogo1.html')">
            <div class="thumb">OBBY</div>
            <h3>Parkour Obby</h3>
            <p style="font-size: 12px; color: #aaa;">Status: Online</p>
        </div>
    </div>

    <script>
        const meuUser = localStorage.getItem('meu_user') || "Anônimo";
        document.getElementById('user-display').innerText = meuUser;

        const peer = new Peer();
        const ID_DO_SERVIDOR = "MEU_ROBLOX_HOST_PRIVADO_2026";

        function entrarNoJogo(nomeMapa, arquivo) {
            const conn = peer.connect(ID_DO_SERVIDOR);
            conn.on('open', () => {
                // Avisa o host que o jogador trocou de tela
                conn.send({ tipo: "MAPA", usuario: meuUser, mapa: nomeMapa });
                setTimeout(() => { window.location.href = arquivo; }, 500);
            });
        }
    </script>
</body>
</html>
