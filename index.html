<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roblox P2P - Loading</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .loadershape { background: red; height: 80px; width: 80px; animation: spin 2s infinite linear; margin: 0 auto; position: relative; }
        .hole { position: absolute; background: #000; height: 25px; width: 25px; top: 27px; left: 27px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .progress { width: 250px; height: 10px; background: #333; margin: 20px auto; border-radius: 5px; overflow: hidden; }
        .bar { height: 100%; width: 0%; background: #26ba40; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="loadershape"><div class="hole"></div></div>
    <p id="t">Conectando ao sistema...</p>
    <div class="progress"><div id="bar" class="bar"></div></div>

    <script>
        const bar = document.getElementById('bar');
        const peer = new Peer(); // Inicia o P2P do jogador
        
        peer.on('open', () => {
            let p = 0;
            const it = setInterval(() => {
                p += 5;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(it);
                    window.location.href = "cadastro.html";
                }
            }, 100);
        });
    </script>
</body>
</html>
