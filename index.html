<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Luni - Login</title>
    <style>
        :root {
            --bg: #111213;
            --card: #1C1E20;
            --input: #2B2D30;
            --text: #FFFFFF;
            --sub-text: #95A5A6;
            --luni-blue: #3498DB;
            --luni-green: #2ECC71;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://www.pixelstalk.net/wp-content/uploads/images5/Cute-Roblox-Wide-Screen-Wallpaper.jpg'); 
            background-size: cover;
            background-position: center;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 340px;
            background: var(--card);
            padding: 40px 30px;
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            border: 1px solid #333;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(to right, #3498DB, #9B59B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        
        label { display: block; text-align: left; margin-bottom: 6px; font-weight: 600; font-size: 11px; color: var(--sub-text); text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: var(--input);
            color: white;
        }

        .btn-main { 
            background: var(--luni-blue); 
            color: white; border: none; padding: 14px; width: 100%; 
            font-weight: bold; cursor: pointer; border-radius: 6px; 
            font-size: 15px; transition: 0.3s; 
        }
        
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .btn-sec { 
            background: transparent; color: var(--sub-text); 
            border: 1px solid #444; padding: 10px; width: 100%; 
            cursor: pointer; margin-top: 15px; font-size: 13px; 
            border-radius: 6px; 
        }

        .hidden { display: none; }
        .dob-container { display: flex; gap: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-name">Word Luni</div>

        <div id="login-form">
            <label>Usuário</label>
            <input type="text" id="log-user" placeholder="Nome de usuário">
            <label>Senha</label>
            <input type="password" id="log-pass" placeholder="Senha">
            <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn-sec" onclick="alternar(true)">Não tem conta? Sign Up</button>
        </div>

        <div id="signup-form" class="hidden">
            <label>Data de Nascimento</label>
            <div class="dob-container">
                <select id="dob-mes"></select>
                <select id="dob-dia"></select>
                <select id="dob-ano"></select>
            </div>
            <label>Usuário</label>
            <input type="text" id="cad-user" placeholder="Crie um nome">
            <label>Senha</label>
            <input type="password" id="cad-pass" placeholder="Mínimo 8 caracteres">
            <button class="btn-main" style="background: var(--luni-green);" onclick="fazerCadastro()">CADASTRAR</button>
            <button class="btn-sec" onclick="alternar(false)">Voltar para Login</button>
        </div>
    </div>

    <script>
        // Gerador de datas (Dias, Meses, Anos)
        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const sM = document.getElementById('dob-mes'), sD = document.getElementById('dob-dia'), sA = document.getElementById('dob-ano');
        meses.forEach(m => { let o = document.createElement('option'); o.text = m; sM.add(o); });
        for(let d=1; d<=31; d++) { let o = document.createElement('option'); o.text = d; sD.add(o); }
        for(let a=2026; a>=1920; a--) { let o = document.createElement('option'); o.text = a; sA.add(o); }

        function alternar(cad) {
            document.getElementById('login-form').classList.toggle('hidden', cad);
            document.getElementById('signup-form').classList.toggle('hidden', !cad);
        }

        // Validação de Cadastro
        function fazerCadastro() {
            const u = document.getElementById('cad-user').value;
            const p = document.getElementById('cad-pass').value;

            if (u.length < 3 || p.length < 3) return alert("Preencha corretamente!");

            // Salva os dados da conta
            localStorage.setItem('db_user', u);
            localStorage.setItem('db_pass', p);
            
            // Entra direto
            localStorage.setItem('meu_user', u);
            window.location.href = "menu.html"; 
        }

        // Validação de Login (SÓ ENTRA SE A CONTA EXISTIR)
        function fazerLogin() {
            const userDigitado = document.getElementById('log-user').value;
            const passDigitada = document.getElementById('log-pass').value;

            const userSalvo = localStorage.getItem('db_user');
            const passSalvo = localStorage.getItem('db_pass');

            if (!userSalvo) {
                alert("Erro: Esta conta não existe no Word Luni!");
                return;
            }

            if (userDigitado === userSalvo && passDigitada === passSalvo) {
                localStorage.setItem('meu_user', userSalvo);
                window.location.href = "menu.html";
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }
    </script>
</body>
</html>
